<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tony Liu's Portfolio</title>
  <script>
    if (window.self !== window.top) {
      document.documentElement.classList.add("is-nested-frame");
    }
  </script>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #f3efe6;
    }

    .mirror-banner {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      padding: 0.9rem 1.25rem;
      background: linear-gradient(90deg, #1d1006 0%, #5b2500 100%);
      color: #fff8ef;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      box-shadow: 0 10px 30px rgba(29, 16, 6, 0.24);
      transition: background 180ms ease, transform 180ms ease;
    }

    .is-nested-frame .mirror-banner {
      display: none;
    }

    .mirror-banner:hover,
    .mirror-banner:focus-visible {
      background: linear-gradient(90deg, #2b1506 0%, #743100 100%);
    }

    .mirror-banner:focus-visible {
      outline: 3px solid rgba(255, 248, 239, 0.65);
      outline-offset: -3px;
    }

    .mirror-banner__icon {
      width: 1rem;
      height: 1rem;
      flex: 0 0 auto;
      transition: transform 180ms ease;
    }

    .mirror-banner:hover .mirror-banner__icon,
    .mirror-banner:focus-visible .mirror-banner__icon {
      transform: translateX(3px);
    }

    .iframe-shell {
      flex: 1 1 auto;
      min-height: 0;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <a class="mirror-banner" href="https://www.tony-liu.com" target="_top" rel="noopener noreferrer">
    <span>You are on a mirrored site. Click to redirect to the main site.</span>
    <svg class="mirror-banner__icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
      <path
        fill="currentColor"
        d="M3.47 12.53a.75.75 0 0 0 1.06 0L11 6.06v4.19a.75.75 0 0 0 1.5 0V4.25a.76.76 0 0 0-.75-.75H5.75a.75.75 0 0 0 0 1.5h4.19l-6.47 6.47a.75.75 0 0 0 0 1.06Z"
      />
    </svg>
  </a>
  <div class="iframe-shell">
    <iframe
      src="https://www.tony-liu.com"
      title="Tony Liu's Portfolio Mirror"
      loading="eager"
      sandbox="allow-forms allow-same-origin allow-scripts allow-top-navigation-by-user-activation"
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
  </div>
</body>
</html>
